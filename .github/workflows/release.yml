name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -p tsconfig.json

      - name: Build
        run: npm run build

      - name: Determine package info
        id: pkg
        run: |
          echo "NAME=$(node -p "require('./package.json').name || 'system-prompt-manager-for-ai-studio'")" >> $GITHUB_ENV
          echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV
          echo "ZIP_NAME=chrome-web-store-v${VERSION}.zip" >> $GITHUB_ENV

      - name: Create zip from dist
        run: |
          mkdir -p release
          cd dist
          zip -r ../release/${ZIP_NAME} .
          cd -

      - name: Upload Chrome Web Store zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-web-store-${{ env.VERSION }}
          path: release/*.zip
          if-no-files-found: error

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ env.VERSION }}
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release v${{ env.VERSION }}
          draft: false
          prerelease: false
          body: |
            Chrome Web Store package: download the asset named `${{ env.ZIP_NAME }}`. Do NOT use "Source code (zip)" — that contains the repository and cannot be installed in Chrome.
          files: |
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
